<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDR Standard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>SDR Standard</h1>
    <p class="subtitle">
      Standard dynamic range versions of the same photographs. The white
      background remains white because nothing in these images exceeds
      the sRGB range.
    </p>
  </header>

  <div class="notice">
    This page looks the same on SDR and HDR displays.
  </div>

  <main>
    <div class="imageGrid">
      <img src="images/photo1-sdr.jpg" alt="Photo 1 — SDR"
           onerror="this.outerHTML='<div class=\'placeholder\'>photo1-sdr.jpg</div>'">
      <img src="images/photo2-sdr.jpg" alt="Photo 2 — SDR"
           onerror="this.outerHTML='<div class=\'placeholder\'>photo2-sdr.jpg</div>'">
      <img src="images/photo3-sdr.jpg" alt="Photo 3 — SDR"
           onerror="this.outerHTML='<div class=\'placeholder\'>photo3-sdr.jpg</div>'">
      <img src="images/photo4-sdr.jpg" alt="Photo 4 — SDR"
           onerror="this.outerHTML='<div class=\'placeholder\'>photo4-sdr.jpg</div>'">
    </div>
  </main>

  <footer>
    HDR Gain Map Demo &mdash; Understanding and Seeing in HDR
  </footer>
</body>
</html>
